<script>
(function(){
  var t=new Date();
  var ymd=t.getFullYear()+String(t.getMonth()+1).padStart(2,"0")+String(t.getDate()).padStart(2,"0");
  var el=document.getElementById("meal-date");
  if(el) el.textContent=t.getFullYear()+"년 "+(t.getMonth()+1)+"월 "+t.getDate()+"일";
  fetch("https://open.neis.go.kr/hub/mealServiceDietInfo?KEY=c0d07312e99641a998e0a3701bd411cf&Type=json&ATPT_OFCDC_SC_CODE=D10&SD_SCHUL_CODE=7240085&MLSV_YMD="+ymd+"&MMEAL_SC_CODE=2")
    .then(function(r){return r.json();})
    .then(function(d){
      var mc=document.getElementById("meal-content");
      var info=d.mealServiceDietInfo;
      if(!info||!info[0]||info[0].head[1].RESULT.CODE!=="INFO-000"){mc.innerHTML="<span style='opacity:0.55;font-size:0.84rem;'>오늘 급식 정보가 없습니다.</span>";return;}
      var dishes=info[1].row[0].DISH_NM.replace(/<br\/>/g,"
").split("
").map(function(d){return d.replace(/\s*\([^)]*\)/g,"").trim();}).filter(function(d){return d.length>0;});
      mc.innerHTML=dishes.map(function(d){return "<div style='display:flex;align-items:center;gap:6px;'><span style='opacity:0.45;font-size:0.7rem;'>▪</span>"+d+"</div>";}).join("");
    })
    .catch(function(){var mc=document.getElementById("meal-content");if(mc)mc.innerHTML="<span style='opacity:0.55;font-size:0.84rem;'>급식 정보를 불러올 수 없습니다.</span>";});
})();
</script>
