AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA   <style>
    /* ===== 색상 변수 ===== */
    :root {
      --primary: #1a3a6b;
      --primary-light: #2a5298;
      --accent: #e8a020;
      --bg: #f4f6fa;
      --surface: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #555577;
      --border: #d0d8e8;
      --success: #2ecc71;
      --warning: #f39c12;
      --danger: #e74c3c;
      --radius: 10px;
      --shadow: 0 2px 12px rgba(26,58,107,0.10);
    }

    /* ===== 기본 리셋 ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Malgun Gothic', '맑은 고딕', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 15px;
    }
    a { color: var(--primary-light); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code {
      background: #eef0f8;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Consolas', 'D2Coding', monospace;
      font-size: 0.9em;
      color: #2a3f6b;
    }
    pre {
      background: #1e2340;
      color: #c8d0f0;
      padding: 16px 20px;
      border-radius: var(--radius);
      overflow-x: auto;
      font-family: 'Consolas', 'D2Coding', monospace;
      font-size: 0.88em;
      line-height: 1.6;
      margin: 12px 0;
    }
    pre code { background: none; color: inherit; padding: 0; font-size: inherit; }

    /* ===== 헤더 ===== */
    header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: #fff;
      padding: 28px 40px 24px;
      box-shadow: 0 3px 16px rgba(26,58,107,0.20);
    }
    .header-inner { max-width: 1100px; margin: 0 auto; }
    header h1 {
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    header h1 span.school { color: var(--accent); }
    header p.subtitle {
      font-size: 0.9rem;
      opacity: 0.82;
      margin-top: 4px;
    }

    /* ===== 탭 네비게이션 ===== */
    nav.tab-nav {
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .tab-nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      gap: 0;
    }
    .tab-btn {
      padding: 14px 32px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-secondary);
      transition: all 0.2s;
      font-family: inherit;
    }
    .tab-btn:hover { color: var(--primary); background: #f0f4fb; }
    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--accent);
      background: #f8faff;
    }

    /* ===== 메인 콘텐츠 영역 ===== */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 60px;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ===== 카드 컴포넌트 ===== */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 28px;
      margin-bottom: 20px;
      border-left: 4px solid var(--primary-light);
    }
    .card h2 {
      font-size: 1.15rem;
      color: var(--primary);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card p { color: var(--text-secondary); margin-top: 6px; }

    /* 섹션 헤더 */
    .section-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
      margin: 32px 0 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ===== 카드 그리드 ===== */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin: 16px 0;
    }
    .grid-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      text-align: center;
      border-top: 3px solid var(--primary-light);
    }
    .grid-card .value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary);
    }
    .grid-card .label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* ===== 단계 흐름 (Flow Steps) ===== */
    .flow-steps { margin: 16px 0; }
    .flow-step {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 16px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px 20px;
      box-shadow: var(--shadow);
    }
    .flow-step-num {
      width: 36px;
      height: 36px;
      background: var(--primary);
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.95rem;
      flex-shrink: 0;
    }
    .flow-step-body h4 { font-size: 1rem; color: var(--primary); margin-bottom: 4px; }
    .flow-step-body p { font-size: 0.9rem; color: var(--text-secondary); }

    /* ===== 아코디언 ===== */
    .accordion { margin: 16px 0; }
    .accordion-item {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 8px;
      overflow: hidden;
    }
    .accordion-header {
      padding: 14px 20px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
      color: var(--primary);
      user-select: none;
    }
    .accordion-header:hover { background: #f0f4fb; }
    .accordion-arrow { transition: transform 0.25s; font-style: normal; }
    .accordion-item.open .accordion-arrow { transform: rotate(180deg); }
    .accordion-body {
      display: none;
      padding: 0 20px 16px;
      color: var(--text-secondary);
      font-size: 0.93rem;
      line-height: 1.75;
    }
    .accordion-item.open .accordion-body { display: block; }

    /* ===== 연락처 카드 그리드 ===== */
    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin: 16px 0;
    }
    .contact-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      border-top: 3px solid var(--accent);
    }
    .contact-card h4 { color: var(--primary); margin-bottom: 8px; font-size: 1rem; }
    .contact-card p { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.6; }

    /* ===== 표 ===== */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .data-table th {
      background: var(--primary);
      color: #fff;
      padding: 11px 16px;
      text-align: left;
      font-size: 0.9rem;
    }
    .data-table td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      color: var(--text);
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:nth-child(even) td { background: #f8faff; }

    /* ===== 플레이스홀더 ===== */
    .placeholder-card {
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 24px;
      text-align: center;
      margin: 20px 0;
    }
    .placeholder-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .placeholder-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .placeholder-desc { font-size: 0.9rem; color: #888; line-height: 1.8; }

    /* ===== 설치 그리드 ===== */
    .install-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
      margin: 16px 0;
    }
    .install-item {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px 18px;
      box-shadow: var(--shadow);
      border-left: 3px solid var(--success);
    }
    .install-item h4 { font-size: 0.95rem; color: var(--primary); margin-bottom: 4px; }
    .install-item p { font-size: 0.83rem; color: var(--text-secondary); }

    /* ===== 학생 탭 내 네비게이션 ===== */
    .sub-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 16px 0 24px;
    }
    .sub-nav-btn {
      padding: 8px 18px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-secondary);
      transition: all 0.2s;
      font-family: inherit;
    }
    .sub-nav-btn:hover { border-color: var(--primary-light); color: var(--primary); }
    .sub-nav-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .sub-panel { display: none; }
    .sub-panel.active { display: block; }

    /* ===== 반응형 ===== */
    @media (max-width: 700px) {
      header { padding: 20px 18px; }
      header h1 { font-size: 1.3rem; }
      main { padding: 20px 14px 40px; }
      .tab-btn { padding: 12px 18px; font-size: 0.88rem; }
      .card { padding: 18px 16px; }
    }

    /* ===== 푸터 ===== */
    footer {
      background: var(--primary);
      color: rgba(255,255,255,0.75);
      text-align: center;
      padding: 14px 24px;
      font-size: 0.82rem;
    }
    footer a { color: rgba(255,255,255,0.85); }
    footer a:hover { color: #fff; }

    /* ===== 검색 ===== */
    .search-wrap { position:relative; margin-left:auto; }
    .search-input { padding:8px 14px 8px 36px; border-radius:20px; border:none; background:rgba(255,255,255,0.2); color:#fff; font-size:0.9rem; width:200px; outline:none; transition:background 0.2s, width 0.2s; }
    .search-input::placeholder { color:rgba(255,255,255,0.6); }
    .search-input:focus { background:rgba(255,255,255,0.35); width:260px; }
    .search-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); opacity:0.75; font-size:0.95rem; pointer-events:none; }
    .search-results { position:absolute; top:calc(100% + 8px); right:0; width:360px; background:#fff; border-radius:10px; box-shadow:0 8px 32px rgba(0,0,0,0.18); z-index:1000; max-height:420px; overflow-y:auto; display:none; }
    .search-results.show { display:block; }
    .search-result-item { padding:12px 16px; cursor:pointer; border-bottom:1px solid #f0f0f0; transition:background 0.15s; }
    .search-result-item:last-child { border-bottom:none; }
    .search-result-item:hover { background:#f0f4fb; }
    .search-result-path { font-size:0.72rem; color:#6b7280; margin-bottom:3px; }
    .search-result-title { font-size:0.88rem; color:#1e3a5f; font-weight:600; }
    .search-result-snippet { font-size:0.78rem; color:#4b5563; margin-top:2px; }
    .search-no-result { padding:20px; text-align:center; color:#9ca3af; font-size:0.88rem; }
    @media (max-width:600px) { .search-input { width:130px; } .search-input:focus { width:170px; } .search-results { width:280px; } }  </style>
</head>

<!-- ===== 탭 전환 JS (인라인) ===== -->
<script>
  function switchTab(tabId, btn) {
    // 탭 패널 전환
    document.querySelectorAll('.tab-panel').forEach(function(p) {
      p.classList.remove('active');
    });
    document.getElementById('tab-' + tabId).classList.add('active');

    // 탭 버튼 활성화
    document.querySelectorAll('.tab-btn').forEach(function(b) {
      b.classList.remove('active');
    });
    btn.classList.add('active');
  }

  function switchSub(panelId, btn) {
    var parent = btn.closest('.tab-panel');
    parent.querySelectorAll('.sub-panel').forEach(function(p) {
      p.classList.remove('active');
    });
    document.getElementById(panelId).classList.add('active');

    parent.querySelectorAll('.sub-nav-btn').forEach(function(b) {
      b.classList.remove('active');
    });
    btn.classList.add('active');
  }

  // 아코디언
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.accordion-header').forEach(function(header) {
      header.addEventListener('click', function() {
        var item = this.closest('.accordion-item');
        item.classList.toggle('open');
      });
    });
  });

  // ===== 검색 기능 =====
  (function() {
    var searchIndex = [];

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function highlight(text, q) {
      var i = text.toLowerCase().indexOf(q.toLowerCase());
      if (i === -1) return escHtml(text);
      return escHtml(text.slice(0,i)) +
        '<mark style="background:#fef08a;border-radius:2px;padding:0 1px">' +
        escHtml(text.slice(i, i+q.length)) + '</mark>' +
        escHtml(text.slice(i+q.length));
    }

    function addItem(el, tabId, tabLabel, subId, subLabel) {
      if (!el || !el.textContent.trim()) return;
      var title = el.textContent.trim();
      var snippetEl = el.nextElementSibling;
      var snippet = snippetEl ? snippetEl.textContent.trim().slice(0,70) : '';
      searchIndex.push({ tabId:tabId, tabLabel:tabLabel, subId:subId, subLabel:subLabel, title:title, snippet:snippet, el:el });
    }

    function indexContainer(container, tabId, tabLabel, subId, subLabel) {
      container.querySelectorAll('.section-title').forEach(function(el) { addItem(el, tabId, tabLabel, subId, subLabel); });
      container.querySelectorAll('.flow-step .step-body > strong').forEach(function(el) { addItem(el, tabId, tabLabel, subId, subLabel); });
      container.querySelectorAll('.card > strong, .install-item > strong').forEach(function(el) { addItem(el, tabId, tabLabel, subId, subLabel); });
      container.querySelectorAll('.data-table tbody td:first-child').forEach(function(el) { addItem(el, tabId, tabLabel, subId, subLabel); });
      container.querySelectorAll('.accordion-header').forEach(function(el) { addItem(el, tabId, tabLabel, subId, subLabel); });
      container.querySelectorAll('.grid-card .label').forEach(function(el) { addItem(el, tabId, tabLabel, subId, subLabel); });
    }

    function buildIndex() {
      searchIndex = [];
      [
        { id:'tab-school',   label:'학교 소개' },
        { id:'tab-teacher',  label:'교사용' },
        { id:'tab-student',  label:'학생·학부모' }
      ].forEach(function(p) {
        var panel = document.getElementById(p.id);
        if (!panel) return;
        var subs = panel.querySelectorAll('.sub-panel');
        if (subs.length === 0) {
          indexContainer(panel, p.id, p.label, null, null);
        } else {
          subs.forEach(function(sub) {
            var titleEl = sub.querySelector('.section-title');
            var subLabel = titleEl ? titleEl.textContent.trim() : sub.id;
            indexContainer(sub, p.id, p.label, sub.id, subLabel);
          });
        }
      });
    }

    function navigate(hit) {
      var tabId = hit.tabId.replace('tab-', '');
      var btn = document.querySelector('.tab-btn[onclick*="switchTab(\'' + tabId + '\'"]');
      if (btn) switchTab(tabId, btn);
      if (hit.subId) {
        var subBtn = document.querySelector('[onclick*="' + hit.subId + '"]');
        if (subBtn) switchSub(hit.subId, subBtn);
      }
      setTimeout(function() {
        hit.el.scrollIntoView({ behavior:'smooth', block:'center' });
        hit.el.style.transition = 'background 0.4s';
        hit.el.style.background = '#fef08a';
        setTimeout(function() { hit.el.style.background = ''; hit.el.style.transition = ''; }, 1600);
      }, 180);
    }

    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(buildIndex, 300);
      var input = document.getElementById('searchInput');
      var results = document.getElementById('searchResults');
      var hits = [];
      var timer;

      input.addEventListener('input', function() {
        clearTimeout(timer);
        timer = setTimeout(function() {
          var q = input.value.trim();
          if (!q) { results.classList.remove('show'); return; }
          hits = searchIndex.filter(function(item) {
            return item.title.toLowerCase().indexOf(q.toLowerCase()) !== -1 ||
                   item.snippet.toLowerCase().indexOf(q.toLowerCase()) !== -1;
          }).slice(0, 12);
          if (hits.length === 0) {
            results.innerHTML = '<div class="search-no-result">검색 결과가 없습니다.</div>';
          } else {
            results.innerHTML = hits.map(function(h, i) {
              var path = h.tabLabel + (h.subLabel ? ' › ' + h.subLabel.replace(/^[^\s]+ /,'') : '');
              return '<div class="search-result-item" data-i="' + i + '">' +
                '<div class="search-result-path">' + escHtml(path) + '</div>' +
                '<div class="search-result-title">' + highlight(h.title, q) + '</div>' +
                (h.snippet ? '<div class="search-result-snippet">' + highlight(h.snippet, q) + '</div>' : '') +
              '</div>';
            }).join('');
          }
          results.classList.add('show');
        }, 180);
      });

      results.addEventListener('click', function(e) {
        var item = e.target.closest('.search-result-item');
        if (!item) return;
        navigate(hits[parseInt(item.dataset.i)]);
        results.classList.remove('show');
        input.value = '';
      });

      document.addEventListener('click', function(e) {
        if (!e.target.closest('.search-wrap')) results.classList.remove('show');
      });

      input.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') { results.classList.remove('show'); input.value = ''; }
      });
    });
  })();
</script>
